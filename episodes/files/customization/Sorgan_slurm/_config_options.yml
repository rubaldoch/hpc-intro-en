# ---------------------------------------------------------------
# HPC Carpentries in the Cloud: Slurm + Software Stack from EESSI
# ---------------------------------------------------------------
#
# The HPC Carpentry Cluster in the Cloud is provided as a public
# service by volunteers. It is provisioned with Magic Castle
# <https://github.com/ComputeCanada/magic_castle> using the EESSI
# <https://eessi.github.io/docs/> software stack. If you need an
# account, please visit <cluster.hpc-carpentry.org>.
#
# Compute responsibly.
---

snippets: "Sorgan_slurm"
organization: "LSC"

local:
  prompt: "[you@laptop:~]$"
  shebang: "#!/bin/bash"

remote:
  name: "Sorgan"
  login_domain: "ssh.lsc.ic.unicamp.br"
  login_port: "6868"
  login_host: "ssh"
  head_host: "sorgan"
  head_domain: "sorgan.lsc.ic.unicamp.br"
  compute_host: "sorgan-cpu5"
  location: "ssh.hpc-carpentry.org"
  homedir: "/home"
  user: "yourUsername"
  module_python3: "Python"
  login_prompt: "[yourUsername@ssh ~]$"
  head_prompt: "[yourUsername@sorgan ~]$"
  head_prompt_venv: "(venv) [yourUsername@sorgan] ~$"
  shebang: "#!/bin/bash"
  modules:
    python: "python"
    mpi: "mpich"


sched:
  name: "Slurm"
  submit:
    name: "sbatch"
    options: ""
  queue:
    debug: "cpu"
    testing: "cpu"
  status: "squeue"
  flag:
    user: "-u yourUsername"
    interactive: ""
    histdetail: "-l -j"
    name: "-J"
    time: "-t"
    queue: "-p"
    partition: "-p cpu"
  del: "scancel"
  interactive: "srun"
  info: "sinfo"
  comment: "#SBATCH"
  hist: "sacct -u yourUsername"
  hist_filter: ""

episode_order:
  - 10-hpc-intro
  - 11-connecting
  - 12-cluster
  - 13-scheduler
  - 14-environment-variables
  - 15-modules
  - 16-transferring-files
  - 17-parallel
  - 18-resources
  - 19-responsibility
